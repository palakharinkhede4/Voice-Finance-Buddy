kind = "web"
previewPath = "/"
title = "ArthBot Finance Assistant"
version = "1.0.0"
id = "artifacts/finance-assistant"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 5000
name = "Finance Assistant"
paths = ["/"]

[services.development]
run = "cd /home/runner/workspace/finance-assistant && streamlit run app.py --server.port 5000"

[services.production]

[services.production.run]
args = ["sh", "-c", "cd /home/runner/workspace/finance-assistant && streamlit run app.py --server.port $PORT --server.address 0.0.0.0 --server.headless true --server.enableCORS false --server.enableXsrfProtection false"]

[services.production.run.env]
PORT = "5000"

[services.production.health.startup]
path = "/_stcore/health"

[services.env]
PORT = "5000"
